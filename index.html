<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Daily Expense Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --paper: #eef0ea;
    --paper-line: #d9dccf;
    --ink: #1c2b3a;
    --ink-soft: #4a5a6a;
    --brass: #b9863f;
    --brass-dark: #8f6529;
    --red: #a6432d;
    --green: #3f7a5c;
    --card: #f8f8f4;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px);
    background-size: 100% 2.1em;
    background-position: 0 7.4em;
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .app { width: 100%; max-width: 780px; }
  header.masthead {
    text-align: center;
    margin-bottom: 28px;
  }
  header.masthead .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brass-dark);
  }
  header.masthead h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 40px;
    margin: 4px 0 0;
    letter-spacing: -0.01em;
  }
  header.masthead .rule {
    width: 64px;
    height: 3px;
    background: var(--brass);
    margin: 14px auto 0;
    border-radius: 2px;
  }

  /* ---- Auth card ---- */
  .auth-card {
    background: var(--card);
    border: 1px solid var(--paper-line);
    border-radius: 10px;
    padding: 36px 32px;
    max-width: 420px;
    margin: 40px auto 0;
    box-shadow: 0 1px 0 rgba(28,43,58,0.04);
  }
  .auth-card h2 { font-family: 'Fraunces', serif; font-size: 22px; margin: 0 0 4px; }
  .auth-card p.sub { color: var(--ink-soft); font-size: 13px; margin: 0 0 22px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--ink-soft); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  input, select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--paper-line);
    border-radius: 6px;
    background: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 16px;
  }
  input:focus, select:focus, button:focus-visible {
    outline: 2px solid var(--brass);
    outline-offset: 1px;
  }
  button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 11px 18px;
  }
  .btn-primary { background: var(--ink); color: #fff; width: 100%; }
  .btn-primary:hover { background: #101924; }
  .btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--paper-line); }
  .btn-ghost:hover { border-color: var(--ink-soft); }
  .auth-toggle { text-align: center; margin-top: 14px; font-size: 13px; color: var(--ink-soft); }
  .auth-toggle a { color: var(--brass-dark); cursor: pointer; font-weight: 600; text-decoration: none; }
  .error-msg { background: #fbeae6; color: var(--red); border: 1px solid #f0c9be; padding: 10px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
  .info-msg { background: #eaf3ee; color: var(--green); border: 1px solid #c7e2d3; padding: 10px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }

  /* ---- Dashboard ---- */
  .hidden { display: none !important; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 12px; flex-wrap: wrap; }
  .toolbar .who { font-size: 13px; color: var(--ink-soft); }
  .toolbar .actions { display: flex; gap: 8px; }
  .toolbar .actions button { padding: 8px 14px; font-size: 13px; }

  .summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--paper-line);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); font-weight: 600; }
  .stat-card .value { font-family: 'IBM Plex Mono', monospace; font-size: 26px; font-weight: 600; margin-top: 6px; }

  .entry-card {
    background: var(--card);
    border: 1px solid var(--paper-line);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .entry-card h3 { font-family: 'Fraunces', serif; font-size: 18px; margin: 0 0 16px; }
  .entry-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
  .entry-grid .full { grid-column: 1 / -1; }

  .ledger-card {
    background: var(--card);
    border: 1px solid var(--paper-line);
    border-radius: 10px;
    overflow: hidden;
  }
  .ledger-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 22px 0;
  }
  .ledger-header h3 { font-family: 'Fraunces', serif; font-size: 18px; margin: 0; }
  .ledger-header select { width: auto; margin: 0; padding: 6px 10px; font-size: 13px; }

  table.ledger { width: 100%; border-collapse: collapse; margin-top: 14px; }
  table.ledger th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    font-weight: 600;
    padding: 8px 22px;
    border-bottom: 2px solid var(--ink);
  }
  table.ledger td {
    padding: 10px 22px;
    border-bottom: 1px solid var(--paper-line);
    font-size: 14px;
    vertical-align: top;
  }
  table.ledger td.amount, table.ledger th.amount { font-family: 'IBM Plex Mono', monospace; text-align: right; font-weight: 500; }
  table.ledger td.num { font-family: 'IBM Plex Mono', monospace; color: var(--ink-soft); font-size: 12px; }
  table.ledger tbody tr:hover { background: rgba(185,134,63,0.06); }
  .cat-pill {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 100px;
    background: #e4e6dd;
    color: var(--ink-soft);
  }
  .del-btn {
    background: transparent; border: none; color: var(--ink-soft);
    cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px;
  }
  .del-btn:hover { color: var(--red); background: #fbeae6; }
  .empty-row td { text-align: center; padding: 40px 22px; color: var(--ink-soft); font-style: italic; }
  footer.credit { text-align: center; font-size: 12px; color: var(--ink-soft); margin-top: 28px; }
  @media (max-width: 560px) {
    .entry-grid, .summary-row { grid-template-columns: 1fr; }
    table.ledger th, table.ledger td { padding: 8px 12px; }
  }
</style>
</head>
<body>
<div class="app">

  <header class="masthead">
    <div class="eyebrow">Daily Record</div>
    <h1>Ledger</h1>
    <div class="rule"></div>
  </header>

  <!-- AUTH VIEW -->
  <div id="auth-view">
    <div class="auth-card">
      <h2 id="auth-title">Welcome back</h2>
      <p class="sub" id="auth-sub">Sign in to your ledger.</p>
      <div id="auth-error" class="error-msg hidden"></div>
      <div id="auth-info" class="info-msg hidden"></div>
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="username" />
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      <button class="btn-primary" id="auth-submit">Sign in</button>
      <div class="auth-toggle">
        <span id="auth-toggle-text">New here?</span>
        <a id="auth-toggle-link">Create an account</a>
      </div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dash-view" class="hidden">
    <div class="toolbar">
      <div class="who">Signed in as <strong id="user-email"></strong></div>
      <div class="actions">
        <button class="btn-ghost" id="export-btn">Export to Excel</button>
        <button class="btn-ghost" id="logout-btn">Sign out</button>
      </div>
    </div>

    <div class="summary-row">
      <div class="stat-card">
        <div class="label">This Month</div>
        <div class="value" id="month-total">₹0.00</div>
      </div>
      <div class="stat-card">
        <div class="label">All Time</div>
        <div class="value" id="all-total">₹0.00</div>
      </div>
    </div>

    <div class="entry-card">
      <h3>Add an expense</h3>
      <div id="add-error" class="error-msg hidden"></div>
      <div class="entry-grid">
        <div>
          <label for="exp-date">Date</label>
          <input id="exp-date" type="date" />
        </div>
        <div>
          <label for="exp-amount">Amount</label>
          <input id="exp-amount" type="number" step="0.01" min="0" placeholder="0.00" />
        </div>
        <div>
          <label for="exp-category">Category</label>
          <select id="exp-category">
            <option>Food</option>
            <option>Transport</option>
            <option>Bills</option>
            <option>Shopping</option>
            <option>Health</option>
            <option>Entertainment</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label for="exp-desc">Note</label>
          <input id="exp-desc" type="text" placeholder="Optional description" />
        </div>
      </div>
      <button class="btn-primary" style="width:auto; margin-top:4px;" id="add-btn">Add entry</button>
    </div>

    <div class="ledger-card">
      <div class="ledger-header">
        <h3>Entries</h3>
        <select id="month-filter"></select>
      </div>
      <table class="ledger">
        <thead>
          <tr>
            <th class="num">#</th>
            <th>Date</th>
            <th>Category</th>
            <th>Note</th>
            <th class="amount">Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="ledger-body">
          <tr class="empty-row"><td colspan="6">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <footer class="credit">Your data is stored in your own Supabase project.</footer>
</div>

<script>
/* =========================================================
   1. CONFIGURE THIS: paste your Supabase project credentials
   ========================================================= */
const SUPABASE_URL = "https://zmklfmlppceiulaybjga.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpta2xmbWxwcGNlaXVsYXliamdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwMDE3MTQsImV4cCI6MjA5ODU3NzcxNH0.XIQPpuEE1QeEcdbubDxd28hfB4dhMbmNy0QIYWkzrGg";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let allExpenses = [];
let isSignupMode = false;

const $ = (id) => document.getElementById(id);

/* ---------------- AUTH ---------------- */
$('auth-toggle-link').addEventListener('click', () => {
  isSignupMode = !isSignupMode;
  $('auth-title').textContent = isSignupMode ? 'Create your ledger' : 'Welcome back';
  $('auth-sub').textContent = isSignupMode ? 'Set up your account to start tracking.' : 'Sign in to your ledger.';
  $('auth-submit').textContent = isSignupMode ? 'Create account' : 'Sign in';
  $('auth-toggle-text').textContent = isSignupMode ? 'Already have an account?' : 'New here?';
  $('auth-toggle-link').textContent = isSignupMode ? 'Sign in' : 'Create an account';
  hideMsg('auth-error'); hideMsg('auth-info');
});

$('auth-submit').addEventListener('click', async () => {
  const email = $('email').value.trim();
  const password = $('password').value;
  hideMsg('auth-error'); hideMsg('auth-info');
  if (!email || !password) { showMsg('auth-error', 'Enter both email and password.'); return; }

  if (isSignupMode) {
    const { error } = await supabaseClient.auth.signUp({ email, password });
    if (error) { showMsg('auth-error', error.message); return; }
    showMsg('auth-info', 'Account created. Check your email if confirmation is required, then sign in.');
  } else {
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) { showMsg('auth-error', error.message); return; }
  }
});

$('logout-btn').addEventListener('click', async () => {
  await supabaseClient.auth.signOut();
});

supabaseClient.auth.onAuthStateChange((_event, session) => {
  if (session && session.user) {
    currentUser = session.user;
    $('auth-view').classList.add('hidden');
    $('dash-view').classList.remove('hidden');
    $('user-email').textContent = currentUser.email;
    $('exp-date').valueAsDate = new Date();
    loadExpenses();
  } else {
    currentUser = null;
    $('dash-view').classList.add('hidden');
    $('auth-view').classList.remove('hidden');
  }
});

function showMsg(id, text) { const el = $(id); el.textContent = text; el.classList.remove('hidden'); }
function hideMsg(id) { $(id).classList.add('hidden'); }

/* ---------------- EXPENSES ---------------- */
async function loadExpenses() {
  const { data, error } = await supabaseClient
    .from('expenses')
    .select('*')
    .order('expense_date', { ascending: false })
    .order('created_at', { ascending: false });

  if (error) { console.error(error); return; }
  allExpenses = data || [];
  populateMonthFilter();
  render();
}

$('add-btn').addEventListener('click', async () => {
  hideMsg('add-error');
  const expense_date = $('exp-date').value;
  const amount = parseFloat($('exp-amount').value);
  const category = $('exp-category').value;
  const description = $('exp-desc').value.trim();

  if (!expense_date || isNaN(amount) || amount <= 0) {
    showMsg('add-error', 'Enter a valid date and amount.');
    return;
  }

  const { error } = await supabaseClient.from('expenses').insert({
    user_id: currentUser.id,
    expense_date,
    amount,
    category,
    description
  });

  if (error) { showMsg('add-error', error.message); return; }

  $('exp-amount').value = '';
  $('exp-desc').value = '';
  await loadExpenses();
});

async function deleteExpense(id) {
  if (!confirm('Delete this entry?')) return;
  const { error } = await supabaseClient.from('expenses').delete().eq('id', id);
  if (error) { alert(error.message); return; }
  await loadExpenses();
}

/* ---------------- FILTER + RENDER ---------------- */
function populateMonthFilter() {
  const months = new Set(allExpenses.map(e => e.expense_date.slice(0, 7)));
  const sorted = Array.from(months).sort().reverse();
  const sel = $('month-filter');
  const prevVal = sel.value || 'all';
  sel.innerHTML = '<option value="all">All months</option>' +
    sorted.map(m => `<option value="${m}">${monthLabel(m)}</option>`).join('');
  sel.value = sorted.includes(prevVal) ? prevVal : 'all';
}

function monthLabel(ym) {
  const [y, m] = ym.split('-');
  const d = new Date(Number(y), Number(m) - 1, 1);
  return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

$('month-filter').addEventListener('change', render);

function currentThisMonthKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function render() {
  const filterVal = $('month-filter').value;
  const filtered = filterVal === 'all'
    ? allExpenses
    : allExpenses.filter(e => e.expense_date.slice(0, 7) === filterVal);

  const tbody = $('ledger-body');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No entries yet. Add your first expense above.</td></tr>';
  } else {
    tbody.innerHTML = filtered.map((e, i) => `
      <tr>
        <td class="num">${String(filtered.length - i).padStart(3, '0')}</td>
        <td>${formatDate(e.expense_date)}</td>
        <td><span class="cat-pill">${escapeHtml(e.category)}</span></td>
        <td>${escapeHtml(e.description || '—')}</td>
        <td class="amount">₹${Number(e.amount).toFixed(2)}</td>
        <td><button class="del-btn" onclick="deleteExpense('${e.id}')" title="Delete">✕</button></td>
      </tr>
    `).join('');
  }

  const thisMonth = currentThisMonthKey();
  const monthTotal = allExpenses
    .filter(e => e.expense_date.slice(0, 7) === thisMonth)
    .reduce((s, e) => s + Number(e.amount), 0);
  const allTotal = allExpenses.reduce((s, e) => s + Number(e.amount), 0);

  $('month-total').textContent = `₹${monthTotal.toFixed(2)}`;
  $('all-total').textContent = `₹${allTotal.toFixed(2)}`;
}

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' });
}
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ---------------- EXPORT TO EXCEL ---------------- */
$('export-btn').addEventListener('click', () => {
  if (allExpenses.length === 0) { alert('No expenses to export yet.'); return; }
  const rows = allExpenses
    .slice()
    .sort((a, b) => a.expense_date.localeCompare(b.expense_date))
    .map(e => ({
      Date: e.expense_date,
      Category: e.category,
      Note: e.description || '',
      Amount: Number(e.amount)
    }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{ wch: 12 }, { wch: 16 }, { wch: 34 }, { wch: 12 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Expenses');
  const today = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `expenses-${today}.xlsx`);
});
</script>
</body>
</html>
