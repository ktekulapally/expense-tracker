<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledger — Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=2">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
</head>
<body class="theme-expenses">
<div class="app">

  <header class="masthead">
    <div class="eyebrow">Daily Record</div>
    <h1>Ledger</h1>
    <div class="rule"></div>
  </header>

  <div class="auth-card">
    <h2>Set a new password</h2>
    <p class="sub" id="reset-sub">Verifying your reset link…</p>
    <div id="reset-error" class="error-msg hidden"></div>
    <div id="reset-info" class="info-msg hidden"></div>

    <div id="reset-form" class="hidden">
      <label for="new-password">New password</label>
      <input id="new-password" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
      <label for="confirm-password">Confirm new password</label>
      <input id="confirm-password" type="password" placeholder="Re-enter password" autocomplete="new-password" />
      <button class="btn-primary" id="reset-submit">Update password</button>
    </div>

    <div id="reset-done" class="hidden">
      <a href="index.html" class="btn-link">Continue to sign in →</a>
    </div>
  </div>
</div>

<script>
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $ = (id) => document.getElementById(id);

function showMsg(id, text) { const el = $(id); el.textContent = text; el.classList.remove('hidden'); }
function hideMsg(id) { $(id).classList.add('hidden'); }

// Clicking the emailed link logs the user into a temporary "recovery"
// session automatically. We just need to wait for that session to appear.
supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' || (session && session.user)) {
    $('reset-sub').textContent = 'Choose a new password for your account.';
    $('reset-form').classList.remove('hidden');
  }
});

// Fallback: if no event fires within a few seconds, the link was likely
// invalid or expired.
setTimeout(() => {
  if ($('reset-form').classList.contains('hidden') && $('reset-done').classList.contains('hidden')) {
    showMsg('reset-error', 'This reset link is invalid or has expired. Go back to the sign-in page and request a new one.');
    $('reset-sub').textContent = '';
  }
}, 4000);

$('reset-submit').addEventListener('click', async () => {
  hideMsg('reset-error'); hideMsg('reset-info');
  const pw = $('new-password').value;
  const confirm = $('confirm-password').value;
  if (pw.length < 6) { showMsg('reset-error', 'Password must be at least 6 characters.'); return; }
  if (pw !== confirm) { showMsg('reset-error', "Passwords don't match."); return; }

  const { error } = await supabaseClient.auth.updateUser({ password: pw });
  if (error) { showMsg('reset-error', error.message); return; }

  $('reset-form').classList.add('hidden');
  $('reset-done').classList.remove('hidden');
  showMsg('reset-info', 'Password updated. You can sign in with it now.');
});
</script>
</body>
</html>
